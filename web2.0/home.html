<!DOCTYPE html>
<html>
<head>
    <title>LID | Laboratorio de Interacción Digital</title>
    <style>
        /* Aquí es donde creamos la IDENTIDAD */
        body {
            background-color: #0a0a0a; /* Fondo casi negro */
            color: #ffffff;            /* Texto blanco */
            font-family: 'Courier New', Courier, monospace; /* Fuente tipo código */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita que la página se mueva */
        }

        /* El ASCII Art */
        .ascii-logo {
            color: #00ff00; /* Verde neón */
            font-size: 8px;
            line-height: 1;
            white-space: pre; /* Respeta los espacios del dibujo */
            margin-bottom: 20px;
            animation: glitch 1s infinite; /* Animación de error */
        }

        /* Animación de Glitch */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); color: #ff00ff; }
            40% { transform: translate(-2px, -2px); color: #00ffff; }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); color: #00ff00; }
        }

        h1 {
            letter-spacing: 10px;
            text-transform: uppercase;
            border: 1px solid #fff;
            padding: 10px 20px;
            transition: 0.5s; /* Para que el hover sea suave */
        }

        /* Interacción al pasar el mouse */
        h1:hover {
            background-color: #fff;
            color: #000;
            cursor: crosshair; /* Cambia el puntero del mouse */
        }

    </style>
</head>
<body>

    <div class="ascii-logo">
      ___      ___  ________  
     |\  \    |\  \|\   ___ \ 
     \ \  \   \ \  \ \  \_|\ \ 
      \ \  \   \ \  \ \  \ \\ \
       \ \  \___\ \  \ \  \_\\ \
        \ \_______\ \__\ \_______\
         \|_______|\|__|\|_______|
    </div>

    <h1>WELCOME</h1>
    <p>SISTEMA DE INTERACCIÓN DIGITAL_ V.01</p>

</body>
</html>
